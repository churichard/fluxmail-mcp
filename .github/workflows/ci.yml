name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      greenmail:
        image: greenmail/standalone:2.1.9
        env:
          GREENMAIL_OPTS: -Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=test1:pwd1@localhost,server:pwd2@localhost,cli:pwd3@localhost
        ports:
          - 3025:3025
          - 3465:3465
          - 3993:3993

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          GREENMAIL_HOST: 127.0.0.1
          NODE_TLS_REJECT_UNAUTHORIZED: 0
