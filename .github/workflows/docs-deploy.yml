name: Deploy MCP documentation

on:
  push:
    branches:
      - main
    paths:
      - docs/public/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy-main
  cancel-in-progress: true

jobs:
  dispatch:
    name: Request documentation pull request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out documentation source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build documentation dependencies
        run: pnpm build

      - name: Validate public documentation
        run: pnpm docs:check

      - name: Verify deployment source
        env:
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          if [[ "$SOURCE_REF" != "main" ]]; then
            echo "Documentation deployment only accepts the main branch." >&2
            exit 1
          fi

      - name: Request Fluxmail deployment
        env:
          DEPLOY_HOOK_URL: ${{ secrets.FLUXMAIL_DOCS_DEPLOY_HOOK }}
        run: |
          if [[ -z "$DEPLOY_HOOK_URL" ]]; then
            echo "FLUXMAIL_DOCS_DEPLOY_HOOK is not configured." >&2
            exit 1
          fi

          response=$(curl \
            --fail-with-body \
            --retry 3 \
            --silent \
            --show-error \
            --request POST \
            "$DEPLOY_HOOK_URL")
          job_id=$(jq -r '.job.id // empty' <<<"$response")
          if [[ -z "$job_id" ]]; then
            echo "Vercel accepted the request but did not return a deployment job ID." >&2
            exit 1
          fi
          echo "Queued Fluxmail documentation deployment: $job_id"
