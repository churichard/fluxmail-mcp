name: Request MCP documentation sync

on:
  push:
    branches:
      - main
    paths:
      - docs/public/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-sync-main
  cancel-in-progress: true

jobs:
  dispatch:
    name: Request documentation pull request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out documentation source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build documentation dependencies
        run: pnpm build

      - name: Validate public documentation
        run: pnpm docs:check

      - name: Resolve immutable source
        id: source
        env:
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          if [[ "$SOURCE_REF" != "main" ]]; then
            echo "Documentation sync only accepts the main branch." >&2
            exit 1
          fi
          sha=$(git rev-parse HEAD)
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Expected a full 40-character Git commit SHA, found $sha." >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Dispatch documentation sync workflow
        env:
          GH_TOKEN: ${{ secrets.FLUXMAIL_DOCS_DEPLOY_TOKEN }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          jq -n \
            --arg ref main \
            --arg sourceSha "$SOURCE_SHA" \
            '{ref: $ref, inputs: {source_sha: $sourceSha, source_ref: "main"}}' |
            gh api --method POST repos/churichard/fluxmail/actions/workflows/sync-mcp-docs.yml/dispatches --input -
