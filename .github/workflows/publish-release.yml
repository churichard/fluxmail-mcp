name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        type: string
      release_sha:
        description: Full commit SHA on main that contains the approved changelog
        required: true
        type: string
      npm_tag:
        description: npm distribution tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tree
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    services:
      greenmail:
        image: greenmail/standalone:2.1.9
        env:
          GREENMAIL_OPTS: -Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=test1:pwd1@localhost,server:pwd2@localhost,cli:pwd3@localhost
        ports:
          - 3025:3025
          - 3465:3465
          - 3993:3993

    steps:
      - name: Validate workflow inputs
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]

      - name: Check out approved release tree
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install MCP publisher
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          mkdir -p .context/bin .context/downloads
          curl --fail --location --silent --show-error \
            --output .context/downloads/mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          publisher_version="${MCP_PUBLISHER_VERSION#v}"
          curl --fail --location --silent --show-error \
            --output .context/downloads/checksums.txt \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/registry_${publisher_version}_checksums.txt"
          expected=$(grep 'mcp-publisher_linux_amd64.tar.gz$' .context/downloads/checksums.txt | awk '{print $1}')
          echo "${expected}  .context/downloads/mcp-publisher.tar.gz" | sha256sum --check
          tar -xzf .context/downloads/mcp-publisher.tar.gz -C .context/bin mcp-publisher
          echo "$PWD/.context/bin" >> "$GITHUB_PATH"

      - name: Validate release metadata
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: pnpm release validate --version "$RELEASE_VERSION" --sha "$RELEASE_SHA"

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Check public docs
        run: pnpm docs:check

      - name: Test
        run: pnpm test
        env:
          GREENMAIL_HOST: 127.0.0.1
          NODE_TLS_REJECT_UNAUTHORIZED: 0

      - name: Save publishable package builds
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ inputs.release_sha }}
          path: |
            packages/*/dist
            .context/bin/mcp-publisher
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  publish:
    name: Publish approved release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Check out approved release tree
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11

      - name: Restore publishable package builds
        uses: actions/download-artifact@v4
        with:
          name: release-build-${{ inputs.release_sha }}
          path: .

      - name: Restore MCP publisher
        run: |
          chmod +x .context/bin/mcp-publisher
          echo "$PWD/.context/bin" >> "$GITHUB_PATH"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish or resume release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NPM_TAG: ${{ inputs.npm_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          pnpm release publish \
            --version "$RELEASE_VERSION" \
            --sha "$RELEASE_SHA" \
            --npm-tag "$RELEASE_NPM_TAG" \
            --resume \
            --skip-checks \
            --ci
