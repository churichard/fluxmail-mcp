services:
  fluxmail:
    container_name: fluxmail
    image: ghcr.io/churichard/fluxmail:latest
    ports:
      - '8977:8977'
      # Local OAuth callback for Outlook and optional local Gmail setup.
      - '127.0.0.1:8976:8976'
    # Settings (provider credentials, FLUXMAIL_PUBLIC_URL, license key, ...) live in
    # a .env file next to this file; see .env.example in the repo.
    env_file:
      - path: .env
        required: false
    environment:
      FLUXMAIL_OAUTH_HOST: 0.0.0.0
    volumes:
      - fluxmail-data:/data
    restart: unless-stopped

volumes:
  fluxmail-data:
